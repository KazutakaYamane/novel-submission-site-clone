; ----------------------------------------------------------
; php-fpm pool 設定
; ECS Fargate での運用前提:
; - ログは stdout/stderr に流して CloudWatch Logs へ
; - ヘルスチェックエンドポイントを有効化
; ----------------------------------------------------------
[www]
user = www-data
group = www-data

listen = 9000
listen.owner = www-data
listen.group = www-data

; プロセス管理: dynamic で十分(static は ECS のスケーリングと相性悪い)
; Fargate 0.25 vCPU / 0.5 GB タスクを想定した控えめな値
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500

; ログを stdout/stderr に流す(コンテナの基本)
access.log = /dev/stdout
catch_workers_output = yes
decorate_workers_output = no

; FPM 内部のステータスとヘルスチェック用エンドポイント
; nginx 側から /fpm-ping を当ててヘルスチェックする
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong

; slow log(設定だけしておく、必要時に有効化)
slowlog = /dev/stderr
request_slowlog_timeout = 5s

; 各リクエストでクリアされる環境変数を素通しする
clear_env = no
