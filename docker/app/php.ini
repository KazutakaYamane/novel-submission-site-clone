; ----------------------------------------------------------
; php.ini 共通(本番のデフォルト値、dev/prod でオーバーレイ)
; 全項目を明示的に書き、デフォルト依存を減らす
; ----------------------------------------------------------

; メモリ・実行時間
memory_limit = 256M
max_execution_time = 30
max_input_time = 30

; アップロード(必要に応じて Laravel 側でさらに制限)
post_max_size = 16M
upload_max_filesize = 16M
max_file_uploads = 20

; セッション
session.cookie_secure = 1
session.cookie_httponly = 1
session.cookie_samesite = "Lax"
session.use_strict_mode = 1

; エラーは stderr に(コンテナログ → CloudWatch Logs へ)
log_errors = On
error_log = /dev/stderr
display_errors = Off
display_startup_errors = Off

; 文字エンコーディング
default_charset = "UTF-8"
mbstring.internal_encoding = "UTF-8"

; タイムゾーン
date.timezone = "Asia/Tokyo"

; expose_php を切る(セキュリティ的な定石)
expose_php = Off
