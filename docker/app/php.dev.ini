; ----------------------------------------------------------
; 開発用 PHP 設定(zz-app.ini の後に読み込まれて上書きする)
; ----------------------------------------------------------

; 開発ではエラーを画面に出す
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

; opcache はファイル変更を検知するように
opcache.enable = 1
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

; アップロードサイズはローカル試験用に緩める
post_max_size = 64M
upload_max_filesize = 64M

; Xdebug 3.x の設定(VSCode / PHPStorm から接続する想定)
; - host.docker.internal でホストを指す(Linux でも 20.10 以降は使える)
; - start_with_request=trigger で常時 attach せず、トリガ時のみ
xdebug.mode = develop,debug,coverage
xdebug.start_with_request = trigger
xdebug.client_host = host.docker.internal
xdebug.client_port = 9003
xdebug.discover_client_host = 0
xdebug.idekey = VSCODE
xdebug.log = /tmp/xdebug.log
xdebug.log_level = 0
