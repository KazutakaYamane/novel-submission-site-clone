; ----------------------------------------------------------
; 本番用 PHP 設定の上書き
; ----------------------------------------------------------

; opcache: ファイル変更チェックを無効化(本番は不変)
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.fast_shutdown = 1

; realpath_cache 大きめ(Laravel は読み取りファイル数が多い)
realpath_cache_size = 4096k
realpath_cache_ttl = 600

; 厳格設定
allow_url_fopen = Off
allow_url_include = Off

; CLI 用に増やす(artisan migrate などで使う)
; FPM 側には影響しない
[CLI Server]
memory_limit = 512M
